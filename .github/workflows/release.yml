name: Release

on:
  push:
    tags: ['v*']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: hustcer/setup-nu@v3
        with:
          version: '*'

      - uses: extractions/setup-just@v2

      - run: just test

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: hustcer/setup-nu@v3
        with:
          version: '*'

      - uses: extractions/setup-just@v2

      - run: just release-build

      - uses: softprops/action-gh-release@v2
        with:
          files: gator-linux-amd64
          generate_release_notes: true
          body: |
            > **Platform support:** Linux (amd64) only for now. See the README for installation instructions.
